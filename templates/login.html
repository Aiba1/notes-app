<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<div class="container d-flex justify-content-center align-items-center vh-100">
  <form method="post" class="card p-4 shadow" style="width: 300px;">
    <h3 class="text-center mb-3">Login</h3>
    
    <input class="form-control mb-2" name="username" placeholder="Username">
    <input class="form-control mb-3" name="password" placeholder="Password" type="password">
    
    <button class="btn btn-primary w-100">Login</button>
    <a href="/register" class="text-center mt-2">Register</a>
  </form>
</div>
